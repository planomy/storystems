<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Story Stem Display</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="controls">
        <button id="shuffle-all" class="btn">Shuffle All</button>
        <div class="font-control" role="group" aria-label="Stem text size">
          <span class="font-control-label">Size</span>
          <button type="button" id="font-size-down" class="font-size-btn" aria-label="Decrease stem size">−</button>
          <span id="font-size-value" class="font-size-value">23px</span>
          <button type="button" id="font-size-up" class="font-size-btn" aria-label="Increase stem size">+</button>
        </div>
      </section>

      <section id="cards" class="cards"></section>
    </main>

    <template id="card-template">
      <article class="card">
        <header class="card-header">
          <h2 class="card-title"></h2>
        </header>
        <div class="difficulty-columns">
          <section class="difficulty col-left">
            <div class="difficulty-header">
              <span>Self</span>
              <div class="header-actions">
                <button class="panel-roll" data-roll-difficulty="self" aria-label="Shuffle column stems">↻</button>
                <button class="panel-add" data-add-difficulty="self" aria-label="Add stem to column">+</button>
              </div>
            </div>
            <ul class="line-list" data-difficulty-list="self"></ul>
          </section>
          <section class="difficulty col-right">
            <div class="difficulty-header">
              <span>Surroundings</span>
              <div class="header-actions">
                <button class="panel-roll" data-roll-difficulty="surroundings" aria-label="Shuffle column stems">↻</button>
                <button class="panel-add" data-add-difficulty="surroundings" aria-label="Add stem to column">+</button>
              </div>
            </div>
            <ul class="line-list" data-difficulty-list="surroundings"></ul>
          </section>
        </div>
      </article>
    </template>

    <template id="single-card-template">
      <article class="card single-column-card">
        <header class="card-header">
          <h2 class="card-title"></h2>
        </header>
        <div class="difficulty-columns">
          <section class="difficulty generic">
            <div class="difficulty-header">
              <span>Generic</span>
              <div class="header-actions">
                <button class="panel-roll" data-roll-difficulty="generic" aria-label="Shuffle generic stems">↻</button>
                <button class="panel-add" data-add-difficulty="generic" aria-label="Add generic stem">+</button>
              </div>
            </div>
            <ul class="line-list" data-difficulty-list="generic"></ul>
          </section>
        </div>
      </article>
    </template>

    <script src="./app.js"></script>
  </body>
  </html>
